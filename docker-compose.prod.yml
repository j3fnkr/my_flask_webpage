
services:
  web-app:
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
  caddy:
    volumes:
      - ${PWD}/conf/prod:/etc/caddy:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
  postgres:
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

volumes:
  certs: {}
  vhost: {}
  html: {}
  acme: {}
