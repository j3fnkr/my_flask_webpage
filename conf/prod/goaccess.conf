time-format %s
date-format %d/%b/%Y
log-format CADDY
# log file to read log
log-file /srv/logs/access.log

config-dialog false
hl-header true
json-pretty-print false
no-color false
no-column-names false
no-csv-summary false
no-progress false
no-tab-scroll false

tz Europe/Berlin

with-mouse false

# server options
origin https://fenker.eu
port 7890
real-time-html true
ws-url wss://fenker.eu/socket
fifo-out /tmp/wspipeout.fifo

agent-list false
with-output-resolver false
http-method yes
http-protocol yes

output /usr/share/caddy/html/index.html

no-query-string false
no-term-resolver false
444-as-404 false
4xx-to-unique-count false
all-static-files false
double-decode false

ignore-crawlers false
crawlers-only false
unknowns-as-crawlers false

ignore-panel REFERRERS
ignore-panel KEYPHRASES

real-os true

static-file . css
static-file .js
static-file .jpg
static-file .png
static-file .gif
static-file .ico
static-file .jpeg
static-file .pdf
static-file .csv
static-file . mpeg
static-file .mpg
static-file .swf
static-file .woff
static-file .woff2
static-file .xls
static-file .xlsx
static-file .doc
static-file .docx
static-file .ppt
static-file . pptx
static-file . txt
static-file .zip
static-file .ogg
static-file .mp3
static-file .mp4
static-file .exe
static-file .iso
static-file .gz
static-file .rar
static-file .svg
static-file . bmp
static-file .tar
static-file .tgz
static-file .tiff
static-file .tif
static-file .ttf
static-file .flv
static-file .dmg
static-file . xz
static-file .zst
